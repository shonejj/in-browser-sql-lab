services:
  # ─── Frontend (Nginx serving Vite build) ──────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - duckdb-net

  # ─── Backend (FastAPI + DuckDB native) ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9876:9876"
    volumes:
      - duckdb-data:/app/data
    environment:
      - DUCKDB_PATH=/app/data/main.duckdb
      - DATA_DIR=/app/data
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_DEFAULT_BUCKET=duckdb-data
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - PRIVACY_MODE=false
      - MAX_IMPORT_FILE_SIZE=52428800
      - MAX_MINIO_FILE_SIZE=524288000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minio
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '1'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9876/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: on-failure
    networks:
      - duckdb-net

  # ─── Temporal Worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python worker.py
    volumes:
      - duckdb-data:/app/data
    environment:
      - DUCKDB_PATH=/app/data/main.duckdb
      - DATA_DIR=/app/data
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_DEFAULT_BUCKET=duckdb-data
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
    depends_on:
      - temporal
      - minio
    networks:
      - duckdb-net

  # ─── MySQL (sample database for testing) ──────────────────────────────────
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: duckdblab
      MYSQL_DATABASE: sampledb
      MYSQL_USER: duckdb
      MYSQL_PASSWORD: duckdblab
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/init_mysql.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - duckdb-net

  # ─── phpMyAdmin ───────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: duckdblab
    depends_on:
      - mysql
    networks:
      - duckdb-net

  # ─── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - duckdb-net

  # ─── Temporal (workflow orchestration) ────────────────────────────────────
  temporal-db:
    image: postgres:13
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    networks:
      - duckdb-net

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    depends_on:
      - temporal-db
    networks:
      - duckdb-net

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - duckdb-net

volumes:
  duckdb-data:
  mysql-data:
  minio-data:
  temporal-db-data:

networks:
  duckdb-net:
    driver: bridge
